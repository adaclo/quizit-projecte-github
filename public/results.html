<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizIt</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/script.js" defer></script>
    <link href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    
  <div>
    <header>
        <div class="nav-container">
    <div class="logo" onclick="window.location.href='index.html'">
        <img src="../img/logo.png" alt="Logo" class="logo-img" style="width: 75px; height: auto; margin-right: 10px;">
        QUIZIT
    </div>
    <nav>
        <button id="dark-mode-toggle">Mode 🌓</button>
        <div>
            <div>
                🏆 <span id="player-best-score">0</span> |
                ⏱️ <span id="player-time">00:00</span>
            </div>
        </div>
    </nav>
</div>
    </header>

    <main>
      <section>
        
        <!-- Title -->
        <div align="center">
          <h1>Resultats Finals!</h1>
        </div>

        <!-- Player -->
        <div align="center">
          <p>Jugador: <span id="player">Adrian</span></p>
        </div>

        <br>

        <!-- Results -->
        <div align="center">
          <table>
            <tr>
              <td>
                <div>
                  <p>Puntuació</p>
                  <strong id="score">8/10</strong>
                </div>
              </td>

              <td>
                <div>
                  <p>Temps</p>
                  <strong id="time">2:30</strong>
                </div>
              </td>
            </tr>
          </table>
        </div>

        <br>

        <!-- Total Questions -->
        <div align="center">
          <p>Preguntes totals: <span id="total">10</span></p>
        </div>

        <br>

        <!-- Restart Button -->
        <div align="center">
          <button onclick="">Jugar de nou</button>
        </div>

      </section>
    </main>
  </div>

</body>
</html>
