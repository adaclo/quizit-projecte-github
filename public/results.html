<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizIt</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/script.js" defer></script>
    <link href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    
  <div>
    <header>
       <div class="nav-container">
        <div class="logo" onclick="window.location.href='index.html'">
            <img src="../img/logo.png" alt="Logo" class="logo-img">
            <span>QUIZIT</span>
        </div>

        <div class="nav-score">
            <div class="score-badge">
                <span class="icon">🎯</span>
                <span class="label">ACIERTOS:</span>
                <span id="player-best-score" class="value">0</span>
            </div>
            <div class="score-badge">
                <span class="icon">⏱️</span>
                <span class="label">TIEMPO:</span>
                <span id="player-time" class="value">00:00</span>
            </div>
        </div>

        <div class="nav-actions">
            <button id="dark-mode-toggle">MODE 🌓</button>
        </div>
    </div>
    </header>

    <main>
      <section>
        
        <!-- Title -->
        <div align="center">
          <h1>Resultats Finals!</h1>
        </div>

        <!-- Player -->
        <div align="center">
          <p>Jugador: <span id="player">Adrian</span></p>
        </div>

        <br>

        <!-- Results -->
        <div align="center">
          <table>
            <tr>
              <td>
                <div>
                  <h2>Puntuació</h2>
                  <strong id="score">8/10</strong>
                </div>
              </td>

              <td>
                <div>
                  <h2>Temps</h2>
                  <strong id="time">2:30</strong>
                </div>
              </td>
            </tr>
          </table>
        </div>

        <br>

        <!-- Total Questions -->
        <div align="center">
          <p>Preguntes totals: <span id="total">10</span></p>
        </div>

        <br>

        <!-- Restart Button -->
        <div align="center">
          <button onclick="">Jugar de nou</button>
        </div>

      </section>
    </main>
  </div>

</body>
</html>
