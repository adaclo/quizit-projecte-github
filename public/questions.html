<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizIt</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/script.js" defer></script>
</head>
<body>
    <header>
        <img src="../img/logo.png" alt="Logo QuizIt" class="logo-img" width="96">
        <div class="logo">QuizIt</div>
        <button id="dark-mode-toggle">Alternar Modo</button>
    </header>

    <main id="gamemode-section">
        <section align="center">
            <h1>PREGUNTA QUIZ</h1>
            <p>Selecciona el modo de juego que quieres jugar:</p>
            <br>
            <div class="menu-buttons">
                <button onclick="startQuiz('ciberseguridad')"><strong>Opción A:</strong><br>Ciberseguridad</button>
                <button onclick="startQuiz('sistemas')"><strong>Opción B:</strong><br>Sistemas Informáticos</button>
                <button onclick="startQuiz('redes')"><strong>Opción C:</strong><br>Redes</button>
                <button onclick="startQuiz('programacion')"><strong>Opción D:</strong><br>Programación</button>
                <button onclick="startQuiz('todos')"><strong>Opción E:</strong><br>Todos</button>
            </div>
        </section>
    </main>

    <main id="questions-section" style="display: none;">
        <section align="center">
            <h1>PREGUNTA QUIZ (<span id="display-category">MODO</span>)</h1>
            <p>Aciertos: <span id="score-counter">0</span></p>
            
            <div class="question-container">
                <h2 id="question-text">Aquí irá la pregunta</h2>
            </div>

            <div class="options-grid">
                <button class="answer-btn" onclick="checkAnswer('A')"><strong>Opción A:</strong><br><span id="text-A"></span></button>
                <button class="answer-btn" onclick="checkAnswer('B')"><strong>Opción B:</strong><br><span id="text-B"></span></button>
                <button class="answer-btn" onclick="checkAnswer('C')"><strong>Opción C:</strong><br><span id="text-C"></span></button>
                <button class="answer-btn" onclick="checkAnswer('D')"><strong>Opción D:</strong><br><span id="text-D"></span></button>
            </div>
        </section>
    </main>
</body>
</html>
