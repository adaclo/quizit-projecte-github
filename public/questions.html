<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizIt</title>
    <link rel="stylesheet" href="../css/style.css">
    <script type="text/javascript" src="js/script.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    
  <div>
    <header>
      <div>
        <div >QuizIt</div>
      </div>
    </header>

    <main>
      <section>
        <!-- Title -->
        <div align="center">
          <h1>PREGUNTA QUIZ</h1>
          <p>Selecciona el modo de juego que quieres jugar:</p>
        </div>
        <br>

        <!-- Options  -->
        <div align="center">
          <table>
            <tr>
              <td>
                <button>
                  <strong>Opción A:</strong><br>
                  Ciberseguridad
                </button>
              </td>

              <td>
                <button>
                  <strong>Opción B:</strong><br>
                  Sistemas Informáticos
                </button>
              </td>
            </tr>

            <tr>
              <td>
                <button>
                  <strong>Option C:</strong><br>
                  Redes
                </button>
              </td>

              <td>
                <button>
                  <strong>Option D:</strong><br>
                  Programación
                </button>
              </td>
              <td>
                <button>
                  <strong>Option E:</strong><br>
                  Todos
                </button>
              </td>
            </tr>
          </table>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
