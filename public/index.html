<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizIt</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/script.js" defer></script>
</head>

<body>

    <header>
        <div class="nav-container">
    <div class="logo" onclick="window.location.href='index.html'">
        <img src="../img/logo.png" alt="Logo" class="logo-img" style="width: 75px; height: auto; margin-right: 10px;">
        QUIZIT
    </div>
    <nav>
        <button id="dark-mode-toggle">Mode 🌓</button>
        <div>
            <div>
                🏆 <span id="player-best-score">0</span> |
                ⏱️ <span id="player-time">00:00</span>
            </div>
        </div>
    </nav>
</div>
    </header>

    <main>

        <!-- Pantalla inicial -->
        <section id="pantalla-inicial">
            <h1>QuizIt</h1>

            <h2>POSA A PROVA ELS TEUS CONEIXEMENTS!</h2>
            <p>Explora diversos temes i posa't a prova. Fes clic a «Comença» per iniciar!</p>

            <!-- ESTE BOTÓN abre el modal -->
            <button id="btn-comencar">Comença</button>
        </section>

        <!-- Modal -->
        <div id="modal" style="display: none;">

            <!-- Fondo -->
            <div id="modal-overlay"></div>

            <!-- Contenido -->
            <div id="modal-content">
                <p>QUIZIT</p>

                <h3>Introducció</h3>
                <p>Introdueix el teu nom de jugador a continuació:</p>

                <input id="nameInput" type="text" placeholder="Ex.: OriolPelucon">

                <!-- ESTE BOTÓN lo usarás en JS -->
                <button id="btn-continuar">Continuar</button>
            </div>
        </div>

    </main>

    <footer>
        <p>© 2026 Quizit. Tots els drets reservats.</p>
    </footer>

</body>
</html>
